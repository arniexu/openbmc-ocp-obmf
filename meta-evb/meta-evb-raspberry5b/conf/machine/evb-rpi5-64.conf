#@TYPE: Machine
#@NAME: EVB RaspberryPi 5B (64bit)
#@DESCRIPTION: OpenBMC EVB machine configuration for RaspberryPi 5 Model B in 64-bit mode

MACHINEOVERRIDES =. "raspberrypi5:"

require conf/machine/raspberrypi5.conf

# Use OpenBMC MMC image/profile for SD card boot media.
require conf/distro/include/phosphor-mmc.inc

# Limit the EVB machine to the Raspberry Pi 5 Model B device tree.
RPI_KERNEL_DEVICETREE = "broadcom/bcm2712-rpi-5-b.dtb"

# RPi5 kernel deploy does not produce fitImage; use linux.bin for MMC tar image assembly.
FLASH_KERNEL_IMAGE = "linux.bin"

include conf/machine/include/obmc-evb-common.inc

IMAGE_INSTALL:append = " go2rtc"
